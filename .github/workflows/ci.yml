name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: soroban-sdk 26.x's build script hard-rejects the
      # `wasm32-unknown-unknown` target on Rust 1.82+ (reference-types /
      # multi-value features it doesn't yet support) and requires
      # `wasm32v1-none` instead -- confirmed locally, not a style choice.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run unit tests
        run: cargo test --workspace --verbose

      - name: Build contracts (wasm)
        run: cargo build --workspace --target wasm32v1-none --release

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci
